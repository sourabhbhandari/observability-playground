# ─────────────────────────────────────────────
#  Observability Playground
#  Stack: Mimir · Loki · Tempo · Grafana · OnCall · OTel
# ─────────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  observability:
    driver: bridge

volumes:
  mimir-data:
  loki-data:
  tempo-data:
  grafana-data:
  minio-data:
  postgres-data:
  redis-data:

services:
  # ──────────────────────────────────────────
  #  Object Storage: MinIO
  # ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    volumes:
      - minio-data:/data
    networks:
      - observability
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Create MinIO buckets for Mimir, Loki, Tempo
  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - observability
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb --ignore-existing myminio/mimir-blocks;
      mc mb --ignore-existing myminio/mimir-ruler;
      mc mb --ignore-existing myminio/mimir-alertmanager;
      mc mb --ignore-existing myminio/loki-chunks;
      mc mb --ignore-existing myminio/loki-ruler;
      mc mb --ignore-existing myminio/tempo-traces;
      echo 'Buckets created successfully';
      "

  # ──────────────────────────────────────────
  #  Metrics: Grafana Mimir (single-binary)
  #  Distroless image – healthcheck disabled,
  #  verify readiness at http://localhost:9009/ready
  # ──────────────────────────────────────────
  mimir:
    image: grafana/mimir:latest
    container_name: mimir
    restart: unless-stopped
    logging: *default-logging
    command: ["-config.file=/etc/mimir/mimir.yaml"]
    volumes:
      - ./config/mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - mimir-data:/data/mimir
    ports:
      - "9009:9009"   # Mimir HTTP (query, push, ruler)
      - "9095:9095"   # Mimir gRPC
    networks:
      - observability
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      disable: true

  # ──────────────────────────────────────────
  #  Logs: Grafana Loki (single-binary)
  #  Distroless image – healthcheck disabled,
  #  verify readiness at http://localhost:3100/ready
  # ──────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    logging: *default-logging
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./config/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"   # Loki HTTP
      - "9096:9096"   # Loki gRPC
    networks:
      - observability
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      disable: true

  # ──────────────────────────────────────────
  #  Traces: Grafana Tempo (single-binary)
  #  Distroless image – healthcheck disabled,
  #  verify readiness at http://localhost:3200/ready
  # ──────────────────────────────────────────
  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    restart: unless-stopped
    logging: *default-logging
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP / Queries
      - "4317:4317"   # OTLP gRPC (traces direct)
      - "4318:4318"   # OTLP HTTP (traces direct)
      - "9411:9411"   # Zipkin
      - "14268:14268" # Jaeger Thrift HTTP
    networks:
      - observability
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      disable: true

  # ──────────────────────────────────────────
  #  OTel Collector (contrib, Alpine-based)
  # ──────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: unless-stopped
    logging: *default-logging
    command: ["--config=/etc/otel/otel-collector.yaml"]
    volumes:
      - ./config/otel-collector/otel-collector.yaml:/etc/otel/otel-collector.yaml:ro
    ports:
      - "4319:4317"   # OTLP gRPC (collector ingress)
      - "4320:4318"   # OTLP HTTP (collector ingress)
      - "8888:8888"   # Collector metrics (self)
      - "9464:9464"   # Prometheus metrics exporter
      - "8889:8889"   # Prometheus exporter (alt)
      - "13133:13133" # Health check
    networks:
      - observability
    depends_on:
      mimir:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started

  # ──────────────────────────────────────────
  #  Visualization: Grafana (Alpine-based)
  # ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin123}
      GF_FEATURE_TOGGLES_ENABLE: "tempoServiceGraph,traceqlEditor,flameGraph"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "grafana-oncall-app"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_ALERTING_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"   # Grafana UI
    networks:
      - observability
    depends_on:
      mimir:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────
  #  Grafana OnCall Dependencies
  # ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: oncall-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oncall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oncall123}
      POSTGRES_DB: ${POSTGRES_DB:-oncall}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oncall}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oncall-redis
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - observability
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: oncall-rabbitmq
    restart: unless-stopped
    logging: *default-logging
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rabbitmq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-rabbitmq123}
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    networks:
      - observability
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────
  #  Grafana OnCall
  # ──────────────────────────────────────────
  oncall-engine:
    image: grafana/oncall:latest
    container_name: oncall-engine
    restart: unless-stopped
    logging: *default-logging
    command: sh -c "python manage.py migrate --noinput && uwsgi --ini uwsgi.ini"
    environment:
      DATABASE_TYPE: postgresql
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-oncall}
      DATABASE_USER: ${POSTGRES_USER:-oncall}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-oncall123}
      BROKER_TYPE: rabbitmq
      RABBITMQ_URI: amqp://${RABBITMQ_USER:-rabbitmq}:${RABBITMQ_PASS:-rabbitmq123}@rabbitmq:5672/
      REDIS_URI: redis://redis:6379/0
      SECRET_KEY: ${GRAFANA_ONCALL_SECRET_KEY:-my-super-secret-key-change-in-prod}
      DJANGO_SETTINGS_MODULE: settings.hobby
      BASE_URL: http://localhost:8080
      GRAFANA_API_URL: http://grafana:3000
    ports:
      - "8080:8080"   # OnCall API / UI
    networks:
      - observability
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      grafana:
        condition: service_healthy

  oncall-celery:
    image: grafana/oncall:latest
    container_name: oncall-celery
    restart: unless-stopped
    logging: *default-logging
    command: sh -c "python manage.py start_celery"
    environment:
      DATABASE_TYPE: postgresql
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-oncall}
      DATABASE_USER: ${POSTGRES_USER:-oncall}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-oncall123}
      BROKER_TYPE: rabbitmq
      RABBITMQ_URI: amqp://${RABBITMQ_USER:-rabbitmq}:${RABBITMQ_PASS:-rabbitmq123}@rabbitmq:5672/
      REDIS_URI: redis://redis:6379/0
      SECRET_KEY: ${GRAFANA_ONCALL_SECRET_KEY:-my-super-secret-key-change-in-prod}
      DJANGO_SETTINGS_MODULE: settings.hobby
      BASE_URL: http://localhost:8080
      GRAFANA_API_URL: http://grafana:3000
    networks:
      - observability
    depends_on:
      - oncall-engine

  # ──────────────────────────────────────────
  #  Sample App (OTel instrumented)
  # ──────────────────────────────────────────
  sample-app:
    build:
      context: ./sample-app
      dockerfile: Dockerfile
    container_name: sample-app
    restart: unless-stopped
    logging: *default-logging
    environment:
      OTEL_SERVICE_NAME: sample-app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_RESOURCE_ATTRIBUTES: "service.version=1.0.0,deployment.environment=playground"
      MIMIR_URL: http://mimir:9009
      LOKI_URL: http://loki:3100
      TEMPO_URL: http://tempo:3200
    ports:
      - "8000:8000"   # Sample App API
    networks:
      - observability
    depends_on:
      otel-collector:
        condition: service_started
