apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1

datasources:
  # ── Mimir (Prometheus-compatible metrics) ──────
  - name: Mimir
    type: prometheus
    uid: mimir
    orgId: 1
    url: http://mimir:9009/prometheus
    access: proxy
    isDefault: true
    jsonData:
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo
      prometheusType: Mimir
      prometheusVersion: "2.9.1"
      incrementalQuerying: true
      queryTimeout: "60s"
      timeInterval: "15s"
    editable: true

  # ── Loki (logs) ────────────────────────────────
  - name: Loki
    type: loki
    uid: loki
    orgId: 1
    url: http://loki:3100
    access: proxy
    jsonData:
      maxLines: 10000
      derivedFields:
        - matcherRegex: "trace_id=(\\w+)"
          name: TraceID
          url: "$${__value.raw}"
          datasourceUid: tempo
        - matcherRegex: '"traceId":"(\\w+)"'
          name: TraceID
          url: "$${__value.raw}"
          datasourceUid: tempo
    editable: true

  # ── Tempo (traces) ─────────────────────────────
  - name: Tempo
    type: tempo
    uid: tempo
    orgId: 1
    url: http://tempo:3200
    access: proxy
    jsonData:
      httpMethod: GET
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-1m"
        spanEndTimeShift: "1m"
        tags:
          - key: service.name
            value: service_name
        filterByTraceID: true
        filterBySpanID: false
        customQuery: false
      tracesToMetrics:
        datasourceUid: mimir
        spanStartTimeShift: "-1m"
        spanEndTimeShift: "1m"
        tags:
          - key: service.name
            value: service
        queries:
          - name: Request Rate
            query: "rate(traces_spanmetrics_calls_total{$$__tags}[5m])"
      serviceMap:
        datasourceUid: mimir
      nodeGraph:
        enabled: true
      search:
        hide: false
      lokiSearch:
        datasourceUid: loki
    editable: true
