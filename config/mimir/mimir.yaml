# ─────────────────────────────────────────────
#  Grafana Mimir – single-binary config (playground)
#  Compatible with Mimir 2.x / 3.x latest
# ─────────────────────────────────────────────
target: all

multitenancy_enabled: false

# ─── Server ───────────────────────────────────
server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: info

# ─── Common Storage (MinIO / S3-compatible) ───
common:
  storage:
    backend: s3
    s3:
      endpoint: minio:9000
      access_key_id: minioadmin
      secret_access_key: minioadmin123
      insecure: true
      bucket_name: mimir-blocks

# ─── Blocks Storage ───────────────────────────
blocks_storage:
  backend: s3
  s3:
    bucket_name: mimir-blocks
    endpoint: minio:9000
    access_key_id: minioadmin
    secret_access_key: minioadmin123
    insecure: true
  tsdb:
    dir: /data/mimir/tsdb
    block_ranges_period: [2h]
    retention_period: 0
    ship_interval: 1m
  bucket_store:
    sync_dir: /data/mimir/tsdb-sync
    index_cache:
      backend: inmemory

# ─── Compactor ────────────────────────────────
compactor:
  data_dir: /data/mimir/compactor
  sharding_ring:
    kvstore:
      store: memberlist

# ─── Distributor ──────────────────────────────
distributor:
  ring:
    kvstore:
      store: memberlist
  ha_tracker:
    enable_ha_tracker: false

# ─── Ingester ─────────────────────────────────
ingester:
  ring:
    kvstore:
      store: memberlist
    replication_factor: 1

# ─── Querier ──────────────────────────────────
querier:
  query_store_after: 12h

# ─── Query Frontend ───────────────────────────
frontend:
  log_queries_longer_than: 10s

# ─── Ruler ────────────────────────────────────
ruler:
  rule_path: /data/mimir/rules
  alertmanager_url: http://localhost:9009/alertmanager
  ring:
    kvstore:
      store: memberlist

ruler_storage:
  backend: s3
  s3:
    bucket_name: mimir-ruler
    endpoint: minio:9000
    access_key_id: minioadmin
    secret_access_key: minioadmin123
    insecure: true

# ─── Alertmanager ─────────────────────────────
alertmanager:
  data_dir: /data/mimir/alertmanager
  sharding_ring:
    kvstore:
      store: memberlist

alertmanager_storage:
  backend: s3
  s3:
    bucket_name: mimir-alertmanager
    endpoint: minio:9000
    access_key_id: minioadmin
    secret_access_key: minioadmin123
    insecure: true

# ─── Store Gateway ────────────────────────────
store_gateway:
  sharding_ring:
    replication_factor: 1
    kvstore:
      store: memberlist

# ─── MemberList (gossip ring) ─────────────────
memberlist:
  join_members: ["127.0.0.1"]

# ─── Limits ───────────────────────────────────
limits:
  ingestion_rate: 100000
  ingestion_burst_size: 200000
  max_global_series_per_user: 2000000
  max_label_names_per_series: 60
  max_label_value_length: 4096
  compactor_blocks_retention_period: 30d
  out_of_order_time_window: 10m
